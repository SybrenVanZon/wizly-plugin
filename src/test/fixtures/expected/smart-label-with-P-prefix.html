<form novalidate [formGroup]="screenFormGroup" [magic]="mgc.inputtext">
  <div class="d-flex flex-row">
    <mat-form-field>
      <mat-label>{{ mg.getText(mgc.L_ControlName) }}</mat-label>

      <input
        matInput
        type="text"
        [magic]="mgc.P_ControlName"
        [placeholder]="mg.getPlaceholder(mgc.P_ControlName)"
        [formControlName]="mgc.P_ControlName"
        mgFormat
      />

      <mat-error>
        <mgError [magic]="mgc.P_ControlName"></mgError>
      </mat-error>
    </mat-form-field>
  </div>
</form>
