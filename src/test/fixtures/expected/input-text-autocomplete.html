<mat-form-field
  [class.d-none]="mg.getVisible(mgc.V_ControlName) === 'hidden'"
  [matTooltip]="mg.getTitle(mgc.V_ControlName)"
>
  <input
    matInput
    [magic]="mgc.V_ControlName"
    [formControlName]="mgc.V_ControlName"
    [matAutocomplete]="auto_V_ControlName"
    mgFormat
    [required]="true"
  />
  <mat-autocomplete #auto_V_ControlName="matAutocomplete">
    @for (option of mg.getFilteredList(mgc.V_ControlName); track option) {
      <mat-option [value]="option.displayValue">
        {{ option.displayValue }}
      </mat-option>
    }
  </mat-autocomplete>

  <mat-hint>{{ mg.getPlaceholder(mgc.V_ControlName) }}</mat-hint>

  <mat-error>
    <mgError [magic]="mgc.V_ControlName"></mgError>
  </mat-error>
</mat-form-field>
