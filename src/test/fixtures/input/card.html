 
<mat-card
    [magic]="mgc.Group1"
    [style.visibility]="mg.getVisible(mgc.Group1)"
    [matTooltip]="mg.getTitle(mgc.Group1)"
    class="container_border"
    [attr.disabled]="mg.isDisabled(mgc.Group1 )"
>
    <div style="display: flex; flex-direction: row">
        <label
            [magic]="mgc.Label2"
            class="lable_overflow"
        >
            {{mg.getText(mgc.Label2)}}
        </label>
    </div>
</mat-card>
